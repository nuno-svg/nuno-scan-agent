name: Daily Consulting Scan

on:
  schedule:
    # Two daily runs at off-peak minutes to reduce risk of GitHub skipping the cron.
    # GitHub may delay scheduled workflows during peak load (round hours are worst).
    # 06:17 UTC (early morning Europe) and 13:17 UTC (afternoon backup).
    - cron: '17 6 * * *'
    - cron: '17 13 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scan agent
        run: python scan/run_daily.py

      - name: Commit updated pipeline and dashboard
        run: |
          git config --local user.email "actions-bot@users.noreply.github.com"
          git config --local user.name "Scan Bot"
          git add docs/pipeline.json docs/index.html scan/last_run.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
