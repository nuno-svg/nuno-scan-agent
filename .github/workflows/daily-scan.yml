name: Daily Consulting Scan

on:
  schedule:
    # 07:00 UTC daily (= 08:00 Lisbon summer, 07:00 Lisbon winter)
    # Note: GitHub may delay cron runs up to ~30 minutes during peak load
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scan agent
        run: python scan/run_daily.py

      - name: Commit updated pipeline and dashboard
        run: |
          git config --local user.email "actions-bot@users.noreply.github.com"
          git config --local user.name "Scan Bot"
          git add docs/pipeline.json docs/index.html scan/last_run.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
